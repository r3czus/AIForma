<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2457E6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FormaAI" />
    <title>FormaAI</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&amp;family=IBM+Plex+Mono:wght@500;600&amp;family=Onest:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="icon" type="image/svg+xml" href="forma-ai-icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <script>
        (() => {
            const theme = localStorage.getItem('formaai-theme');
            if (theme === 'light' || theme === 'dark') document.documentElement.dataset.theme = theme;
        })();
    </script>
</head>

<body>
    <div id="offline-banner" role="status">Brak połączenia. Możesz przeglądać zapisany interfejs; zapis danych wróci po połączeniu.</div>
    <div id="app" class="loading">
        <strong>FORMA<span>/AI</span></strong>
        <small>Układamy Twój plan dnia…</small>
    </div>
    <div id="blazor-error-ui">
        Wystąpił błąd aplikacji.
        <a href="" class="reload">Odśwież</a>
        <a class="dismiss">×</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script src="js/forma-settings.js"></script>
    <script>
        navigator.serviceWorker.register('service-worker.js');
        const offlineBanner = document.getElementById('offline-banner');
        const updateConnection = () => offlineBanner.classList.toggle('visible', !navigator.onLine);
        addEventListener('online', updateConnection);
        addEventListener('offline', updateConnection);
        updateConnection();

        window.formaTimer = (() => {
            let audio;
            const ready = async () => {
                audio ??= new (window.AudioContext || window.webkitAudioContext)();
                if (audio.state === 'suspended') await audio.resume();
            };
            const done = async () => {
                await ready();
                [0, .18].forEach(delay => {
                    const tone = audio.createOscillator();
                    const volume = audio.createGain();
                    tone.frequency.value = 880;
                    volume.gain.setValueAtTime(.16, audio.currentTime + delay);
                    volume.gain.exponentialRampToValueAtTime(.001, audio.currentTime + delay + .14);
                    tone.connect(volume).connect(audio.destination);
                    tone.start(audio.currentTime + delay);
                    tone.stop(audio.currentTime + delay + .15);
                });
            };
            return { ready, done };
        })();
    </script>
</body>

</html>
