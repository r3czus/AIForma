<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#3157E5" />
    <title>FormaAI</title>
    <base href="/" />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700&amp;family=IBM+Plex+Mono:wght@500;600&amp;family=Onest:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/app.css" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="offline-banner" role="status">Brak połączenia. Możesz przeglądać zapisany interfejs; zapis danych wróci po połączeniu.</div>
    <div id="app" class="loading">
        <strong>FORMA<span>/AI</span></strong>
        <small>Układamy Twój plan dnia…</small>
    </div>
    <div id="blazor-error-ui">
        Wystąpił błąd aplikacji.
        <a href="" class="reload">Odśwież</a>
        <a class="dismiss">×</a>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>
    <script>
        navigator.serviceWorker.register('service-worker.js');
        const offlineBanner = document.getElementById('offline-banner');
        const updateConnection = () => offlineBanner.classList.toggle('visible', !navigator.onLine);
        addEventListener('online', updateConnection);
        addEventListener('offline', updateConnection);
        updateConnection();
    </script>
</body>

</html>
